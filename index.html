<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback} = React;

const eS=()=>({innovation:0,technical:0,impact:0,scalability:0,presentation:0});
const wt=s=>{if(!s)return 0;return parseFloat((CR.reduce((t,c)=>t+(s[c.key]||0)*c.w,0)/100).toFixed(1));};

const LS={

const QB={
  "IoT":{
    q:["Walk me through end-to-end data flow — sensor to decision. What at each layer?","What protocol and why over LoRa, Zigbee, or BLE?","How does it behave when network drops? Show offline/edge logic.","What is power consumption and realistic battery life in deployment?","How do you handle sensor calibration drift?","Security model — auth, encryption, OTA updates?","1,000 unit deployment cost — walk me through your BOM."],
    r:["Demo only on local WiFi — no field deployment data","Cannot explain what happens when a node loses connectivity","Power tested on bench only","No security model — firmware unencrypted"],
    p:"Push on real-world failure modes — sensor drift, connectivity loss, power budgets in field."
  },
  "Drone Technology":{
    q:["Demonstrate a failure scenario — noisy sensor input?","How does autonomy handle edge cases not in training?","Obstacle avoidance latency — detect to react, how benchmarked?","Walk through safety kill-switch and fail-safe architecture.","Regulatory compliance — DGCA approvals, geofencing?","Localization accuracy indoors vs outdoors without GPS?","Onboard vs offboard compute — latency implications?"],
    r:["No fail-safe — safety assumed not engineered","Only tested in lab, no real-world trials","Unaware of regulatory requirements","Autonomy breaks with simple unexpected obstacle"],
    p:"Test safety — simulate a sensor failure live and show what the system does."
  },
  "AI / ML":{
    q:["Accuracy on a held-out test set it has NEVER seen?","How did you handle class imbalance, data leakage, overfitting?","Performance on adversarial or out-of-distribution inputs?","Full ML pipeline — collection, labeling, training, validation, deployment?","Dataset size and real-world diversity assurance?","Inference latency and compute cost at production scale?","How do you detect and handle model drift post-deployment?"],
    r:["Accuracy on training data, not a test set","Dataset under 500 samples or unrepresentative","Cannot explain why the model makes specific predictions","No plan for monitoring or retraining"],
    p:"Ask them to show the model failing — every strong ML project knows where it breaks."
  },
  "Other Innovations":{
    q:["Measurable impact — CO₂ saved, energy generated, waste reduced?","Lifecycle cost vs the status quo it replaces?","Economic payback period for an end user?","Performance under variable conditions — weather, seasons?","Durability and maintenance cost over 5–10 years?","Life Cycle Assessment conducted or referenced?","First buyer and regulatory pathway?"],
    r:["Environmental claims with no measurement methodology","Works only under ideal conditions","Economic model ignores total cost of ownership","No LCA — may cost more environmentally than it saves"],
    p:"Challenge every impact number — ask for methodology behind each metric."
  },
  "Vibe Coding":{
    q:["Real users beyond your team? Show usage analytics.","Architecture under 10x load — will it hold?","Data privacy and compliance handling?","Customer acquisition cost and churn from beta?","Key user workflow live with data entered right now.","Authentication and vulnerability handling?","Monetization model — have users committed to pay?"],
    r:["No real users — only internal testing","Single server, no redundancy or scaling","No privacy policy despite handling user data","Demo uses pre-seeded data — breaks with fresh input"],
    p:"See it work with data entered live — the gap between demo and reality is where apps fail."
  },
  "_fallback_open":{
    q:["Specific problem and who experiences it most?","How did you validate this problem before building?","What alternatives exist and what makes yours better?","Most important technical innovation?","How does it work outside the demo — what breaks first?","Path from prototype to deployment in 12 months?","What would you change with 6 more months and ₹5 lakhs?"],
    r:["Problem vague — no measurable pain point","No competitive analysis","Works only under demo conditions","No clear user defined"],
    p:"Ask when they last spoke to a potential user — genuine research separates strong projects."
  }
};
const gQB=c=>QB[c]||QB["Other Innovations"]||QB["_fallback_open"]||Object.values(QB)[4];

let _key="";
const sKey=k=>{_key=k?k.trim():"";};
const pN=(t,k,d=6)=>{const m=t.match(new RegExp(k+"\\s*[:\\-]\\s*(\\d+(?:\\.\\d+)?)","i"));return m?Math.min(10,Math.max(0,parseFloat(m[1]))):d;};
const pS=(t,k,d="")=>{const m=t.match(new RegExp(k+"\\s*[:\\-]\\s*(.+)","i"));return m?m[1].trim():d;};

async function callAI(prompt){
  if(!_key)throw new Error("NO_KEY");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":_key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})
  });
  const txt=await res.text();
  let d;try{d=JSON.parse(txt);}catch(e){throw new Error("Bad response: "+txt.slice(0,60));}
  if(d.error)throw new Error(d.error.message||"API error");
  const o=(d.content||[]).map(b=>b.text||"").join("").trim();
  if(!o)throw new Error("Empty response");
  return o;
}

    return `<div style="break-inside:avoid;margin-bottom:20px;border:1px solid #d1d5db;border-radius:10px;overflow:hidden"><div style="background:${i===0?"#1e1b4b":i===1?"#1e3a5f":"#1a2530"};padding:12px 16px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:bold;color:#fff">${MD[i]||"#"+(i+1)} ${t.name}</div><div style="font-size:10px;color:#94a3b8">${t.cat}</div></div><div style="text-align:right"><div style="font-size:28px;font-weight:bold;color:#f59e0b">${wt(t.finalScores)}</div><div style="font-size:10px;color:#64748b">/10</div></div></div><div style="padding:12px 16px;background:#fff"><table style="width:100%;border-collapse:collapse;margin-bottom:10px;font-size:11px"><thead><tr style="background:#f8fafc"><th style="padding:6px 8px;text-align:left;border-bottom:2px solid #e2e8f0">Criterion</th><th style="padding:6px 8px;text-align:center;border-bottom:2px solid #e2e8f0">Wt</th><th style="padding:6px 8px;text-align:center;border-bottom:2px solid #e2e8f0;color:#f59e0b">Manual</th><th style="padding:6px 8px;text-align:center;border-bottom:2px solid #e2e8f0;color:#2563eb">AI</th><th style="padding:6px 8px;text-align:center;border-bottom:2px solid #e2e8f0;color:#16a34a;background:#f0fdf4">Final</th></tr></thead><tbody>${rows}</tbody></table>${t.aiAnalysis?`<div style="background:#eff6ff;border-left:4px solid #2563eb;padding:8px 10px;font-size:11px;color:#1e40af;margin-bottom:8px"><strong>AI: </strong>${t.aiAnalysis}</div>`:""}</div></div>`;
  }).join("");
  const sumRows=ranked.map((t,i)=>`<tr style="background:${i%2===0?"#f8fafc":"#fff"};border-bottom:1px solid #e2e8f0"><td style="padding:9px 10px;font-size:16px">${MD[i]||"#"+(i+1)}</td><td style="padding:9px 10px;font-weight:bold">${t.name}</td><td style="padding:9px 10px;color:#475569;font-size:10px">${t.cat.split("/")[0].trim()}</td><td style="padding:9px 10px;text-align:center;color:#f59e0b;font-weight:bold">${wt(t.manualScores)||"—"}</td><td style="padding:9px 10px;text-align:center;color:#2563eb;font-weight:bold">${t.aiScores?wt(t.aiScores):"—"}</td><td style="padding:9px 10px;text-align:center;font-size:16px;font-weight:bold;color:${i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#b45309":"#0f172a"}">${wt(t.finalScores)}</td><td style="padding:9px 10px;text-align:center"><span style="font-size:9px;padding:2px 7px;border-radius:10px;background:${t.finalized?"#dcfce7":"#fef9c3"};color:${t.finalized?"#16a34a":"#ca8a04"}">${t.finalized?"FINAL":"SCORED"}</span></td></tr>`).join("");

"text-align:center;margin-top:24px;font-size:10px;color:#94a3b8">${footerJudge}HackFusion Judge Pro · Built with Claude AI · Anthropic</div></div></body></html>`;
  const w=window.open("","_blank");
  if(w){w.document.write(html);w.document.close();}else alert("Allow popups to open PDF.");

// ── CSV Export ────────────────────────────────────────────────────────────────
function xCSV(teams,expo){
  expo=expo||{};
  const ck=["innovation","technical","impact","scalability","presentation"];
  const cl=["Innovation","Technical","Impact","Scalability","Presentation"];
  const esc=v=>{const s=String(v==null?"":v);return(s.includes(",")||s.includes('"')||s.includes("\n"))?`"${s.replace(/"/g,'""')}"`:s;};
  const hdr=["#","Team","Category","Description","Visited","Finalized",...cl.map(c=>c+" (Manual)"),["Manual Total"],...cl.map(c=>c+" (AI)"),["AI Total"],...cl.map(c=>c+" (Final)"),["Final Score"],"AI Analysis","AI Verdict","Stall Notes","Pitch Notes"].flat();
  const rows=teams.map((t,i)=>[i+1,t.name,t.cat,t.desc||"",t.visited?"Yes":"No",t.finalized?"Yes":"No",...ck.map(k=>t.manualScores[k]||0),wt(t.manualScores)||"",...ck.map(k=>t.aiScores?t.aiScores[k]||0:""),t.aiScores?wt(t.aiScores):"",...ck.map(k=>t.finalScores?t.finalScores[k]||0:""),t.finalScores?wt(t.finalScores):"",t.aiAnalysis||"",t.aiVerdict||"",t.stallNotes||"",t.pitchNotes||""]);
  const csv=[hdr,...rows].map(r=>r.map(esc).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download=(expo.expoName||"HackFusion2026").replace(/\s+/g,"_")+"_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// ── Team Import ───────────────────────────────────────────────────────────────
function TeamImport({cats,onImport}){
  const [rows,setRows]=useState([]);
  const [headers,setHeaders]=useState([]);
  const [map,setMap]=useState({name:"",cat:"",desc:""});
  const [preview,setPreview]=useState([]);
  const [status,setStatus]=useState("");
  const [gUrl,setGUrl]=useState("");
  const [loading,setLoading]=useState(false);
  const fileRef=useRef(null);

  function autoMap(hdrs){
    const lc=h=>h.toLowerCase();
    const find=(...keys)=>hdrs.find(h=>keys.some(k=>lc(h).includes(k)))||"";
    return {
      name:find("team","project","name","title","stall"),
      cat: find("cat","category","track","domain","type","stream"),
      desc:find("desc","description","abstract","summary","about","idea")
    };
  }

  function processSheet(wb){
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
    if(!data||data.length<2){setStatus("⚠ Sheet appears empty or has only one row.");return;}
    const hdrs=data[0].map(h=>String(h).trim()).filter(Boolean);
    const body=data.slice(1).filter(r=>r.some(c=>String(c).trim()));
    setHeaders(hdrs);setRows(body);setPreview(body.slice(0,5));
    const m=autoMap(hdrs);setMap(m);
    setStatus("✅ Loaded "+body.length+" row"+(body.length!==1?"s":"")+" — map columns below then tap IMPORT.");
  }

  function handleFile(e){
    const file=e.target.files[0];if(!file)return;
    setStatus("📖 Reading file...");
    const reader=new FileReader();
    reader.onload=ev=>{
      try{const wb=XLSX.read(ev.target.result,{type:"array"});processSheet(wb);}
      catch(err){setStatus("❌ Could not parse file: "+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  async function fetchGSheet(){
    if(!gUrl.trim())return;
    setLoading(true);setStatus("🔄 Fetching Google Sheet...");
    try{
      let csvUrl=gUrl.trim();
      const idMatch=csvUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
      if(idMatch)csvUrl="https://docs.google.com/spreadsheets/d/"+idMatch[1]+"/export?format=csv&gid=0";
      const res=await fetch(csvUrl);
      if(!res.ok)throw new Error("HTTP "+res.status+" — make sure sheet is shared as 'Anyone with link can view'");
      const text=await res.text();
      const wb=XLSX.read(text,{type:"string"});
      processSheet(wb);
    }catch(e){setStatus("❌ "+e.message);}
    setLoading(false);
  }

  function doImport(){
    if(!map.name){setStatus("⚠ Please map the Team Name column first.");return;}
    const ni=headers.indexOf(map.name);
    const ci=headers.indexOf(map.cat);
    const di=headers.indexOf(map.desc);
    const imported=rows.map(r=>{
      const name=String(r[ni]||"").trim();if(!name)return null;
      const rawCat=ci>=0?String(r[ci]||"").trim():"";
      // Smart category matching — handles short labels like "AI/ML", "Software", "IoT" etc.
      const matchCat = (raw, catList) => {
        if (!raw) return catList[0];
        const r = raw.toLowerCase().trim();
        // 1. Exact match
        let m = catList.find(c => c.toLowerCase() === r);
        if (m) return m;
        // 2. Category contains the raw string
        m = catList.find(c => c.toLowerCase().includes(r));
        if (m) return m;
        // 3. Raw string contains any keyword from category
        m = catList.find(c => c.toLowerCase().split(/[\/\s,&]+/).some(word => word.length > 2 && r.includes(word)));
        if (m) return m;
        // 4. Keyword aliases — common shorthand from Excel sheets
        const aliases = {
          "ai":       "AI / ML",
          "ml":       "AI / ML",
          "nlp":      "AI / ML",
          "cv":       "AI / ML",
          "machine":  "AI / ML",
          "deep":     "AI / ML",
          "vision":   "AI / ML",
          "computer": "AI / ML",
          "data":     "AI / ML",
          "neural":   "AI / ML",
          "genai":    "AI / ML",
          "llm":      "AI / ML",
          "software": "Vibe Coding",
          "web":      "Vibe Coding",
          "mobile":   "Vibe Coding",
          "app":      "Vibe Coding",
          "saas":     "Vibe Coding",
          "vibe":     "Vibe Coding",
          "code":     "Vibe Coding",
          "fullstack":"Vibe Coding",
          "hardware": "IoT",
          "iot":      "IoT",
          "embedded": "IoT",
          "sensor":   "IoT",
          "smart":    "IoT",
          "robot":    "Drone Technology",
          "drone":    "Drone Technology",
          "uav":      "Drone Technology",
          "autonomous":"Drone Technology",
          "aerial":   "Drone Technology",
          "green":    "Other Innovations",
          "sustain":  "Other Innovations",
          "energy":   "Other Innovations",
          "agro":     "Other Innovations",
          "farm":     "Other Innovations",
          "open":     "Other Innovations",
          "other":    "Other Innovations",
          "innov":    "Other Innovations",
          "health":   "Other Innovations",
          "edu":      "Other Innovations",
          "finance":  "Other Innovations",
          "block":    "Other Innovations",
        };
        const aliasMatch = Object.keys(aliases).find(k => r.includes(k));
        if (aliasMatch) {
          // If custom cats provided, try to find a similar one there first
          const customMatch = catList.find(c => c.toLowerCase().includes(aliasMatch));
          if (customMatch) return customMatch;
          // Fall back to default alias if it exists in catList
          const defMatch = catList.find(c => c === aliases[aliasMatch]);
          if (defMatch) return defMatch;
        }
        // 5. Last resort — Open Category
        return catList.find(c=>c.toLowerCase().includes('other')||c.toLowerCase().includes('innovation')||c.toLowerCase().includes('open'))||catList[catList.length-1];
      };
      const cat = matchCat(rawCat, cats);
      const desc=di>=0?String(r[di]||"").trim():"";
      return mkT(name,cat,desc);
    }).filter(Boolean);
    if(!imported.length){setStatus("⚠ No valid team names found in selected column.");return;}
    onImport(imported);
    setStatus("🎉 Imported "+imported.length+" team"+(imported.length!==1?"s":"")+"! Switch to TEAMS tab to view.");
    setRows([]);setHeaders([]);setPreview([]);setMap({name:"",cat:"",desc:""});
  }

  const colOpts=["", ...headers];
  const statusColor=status.startsWith("❌")||status.startsWith("⚠")?RD:status.startsWith("🎉")||status.startsWith("✅")?GR:BL;

  return <Crd s={{borderColor:BL+"30"}} ch={
    <div>
      <Lbl c={BL} ch="📥 IMPORT TEAMS FROM FILE"/>
      <div style={{fontSize:"10px",color:DIM,marginBottom:"12px",lineHeight:"1.7"}}>
        Upload an Excel / CSV file <strong style={{color:TX}}>or</strong> paste a public Google Sheets URL.<br/>
        Columns are auto-detected. Existing teams are kept — import only adds new ones.
      </div>

      {/* File upload */}
      <div style={{marginBottom:"10px"}}>
        <div style={{fontSize:"10px",color:DIM,marginBottom:"5px"}}>📂 Excel / CSV file</div>
        <Btn v="outline" full ch="CHOOSE FILE (.xlsx / .xls / .csv)" s={{borderColor:BL,color:BL}}
          onClick={()=>fileRef.current.click()}/>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={handleFile}/>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
        <div style={{flex:1,height:"1px",background:BD}}/><span style={{fontSize:"9px",color:DIM}}>OR</span><div style={{flex:1,height:"1px",background:BD}}/>
      </div>

      {/* Google Sheets */}
      <div style={{marginBottom:"12px"}}>
        <div style={{fontSize:"10px",color:DIM,marginBottom:"5px"}}>🔗 Google Sheets URL (must be public)</div>
        <div style={{display:"flex",gap:"6px"}}>
          <Fi value={gUrl} onChange={e=>setGUrl(e.target.value)}
            placeholder="https://docs.google.com/spreadsheets/d/..."
            onKeyDown={e=>e.key==="Enter"&&fetchGSheet()} s={{flex:1,fontSize:"11px"}}/>
          <Btn ch="FETCH" onClick={fetchGSheet} loading={loading} s={{padding:"10px 10px"}}/>
        </div>
        <div style={{fontSize:"9px",color:DIM,marginTop:"4px"}}>
          In Google Sheets: File → Share → Anyone with link → Viewer
        </div>
      </div>

      {/* Status */}
      {status&&<div style={{padding:"8px 10px",background:"#0a0d15",borderRadius:"6px",fontSize:"11px",color:statusColor,marginBottom:"10px",lineHeight:"1.5"}}>{status}</div>}

      {/* Column mapping + preview */}
      {headers.length>0&&<div>
        <Lbl ch="MAP YOUR COLUMNS"/>
        {[{k:"name",label:"Team / Project Name *",req:true},{k:"cat",label:"Category (optional)"},{k:"desc",label:"Description (optional)"}].map(({k,label,req})=>
          <div key={k} style={{marginBottom:"8px"}}>
            <div style={{fontSize:"10px",color:req?A:DIM,marginBottom:"3px"}}>{label}</div>
            <Fsl value={map[k]} onChange={e=>setMap(m=>({...m,[k]:e.target.value}))}
              ch={colOpts.map(o=><option key={o} value={o}>{o||"— not mapped —"}</option>)}/>
          </div>
        )}

        {preview.length>0&&<div>
          <div style={{fontSize:"9px",color:DIM,marginBottom:"5px",marginTop:"10px"}}>PREVIEW — first {preview.length} rows</div>
          <div style={{overflowX:"auto",marginBottom:"10px",borderRadius:"6px",border:`1px solid ${BD}`}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:"10px"}}>
              <thead>
                <tr style={{background:"#0a0d15"}}>
                  {[map.name,map.cat,map.desc].filter(Boolean).map(h=><th key={h} style={{padding:"5px 8px",color:A,textAlign:"left",borderBottom:`1px solid ${BD}`,whiteSpace:"nowrap"}}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {preview.map((r,i)=>
                  <tr key={i} style={{borderBottom:`1px solid ${BD}`}}>
                    {[map.name,map.cat,map.desc].filter(Boolean).map(h=>{
                      const idx=headers.indexOf(h);
                      return <td key={h} style={{padding:"5px 8px",color:TX,maxWidth:"130px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{String(r[idx]||"")}</td>;
                    })}
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </div>}

        <Btn v="green" full ch={"⬇ IMPORT "+rows.length+" TEAMS INTO APP"} onClick={doImport}/>
        <div style={{fontSize:"9px",color:DIM,marginTop:"5px",textAlign:"center"}}>Adds to existing teams — duplicates not removed automatically</div>
      </div>}
    </div>
  }/>;
}

// ── Expo Info ─────────────────────────────────────────────────────────────────
function ExpoInfo({expo,setExpo,customCats,setCustomCats,onImport}){
  const [nc,sNc]=useState("");
  const [flash,setFlash]=useState(false);
  const fileRef=useRef(null);
  const cats=customCats.length>0?customCats:CATS;

  function upd(patch){
    const next={...expo,...patch};
    setExpo(next);LS.s("hfj_expo",next);
    setFlash(true);setTimeout(()=>setFlash(false),1200);
  }

  function handleLogo(e){
    const file=e.target.files[0];if(!file)return;
    if(file.size>600000){alert("Logo too large — please use an image under 600KB.");return;}
    const reader=new FileReader();
    reader.onload=ev=>upd({logo:ev.target.result});
    reader.readAsDataURL(file);
  }

  function addCat(){
    const t=nc.trim();
    if(!t||customCats.includes(t))return;
    const next=[...customCats,t];setCustomCats(next);LS.s("hfj_cats",next);sNc("");
  }

  function delCat(c){
    const next=customCats.filter(x=>x!==c);setCustomCats(next);LS.s("hfj_cats",next);
  }

  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"12px"}}>
    <Info c={A} ch={<>Fill in your expo details — they appear in the <strong>PDF report header</strong> and personalise this app for your event. Everything auto-saves as you type.</>}/>

    {/* Expo details */}
    <Crd ch={<div>
      <Lbl ch="EXPO / EVENT DETAILS"/>
      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
        <div>
          <div style={{fontSize:"10px",color:DIM,marginBottom:"4px"}}>Hackathon / Expo Name</div>
          <Fi value={expo.expoName||""} onChange={e=>upd({expoName:e.target.value})} placeholder="e.g. HackFusion 2026"/>
        </div>
        <div>
          <div style={{fontSize:"10px",color:DIM,marginBottom:"4px"}}>Judge Name</div>
          <Fi value={expo.judgeName||""} onChange={e=>upd({judgeName:e.target.value})} placeholder="e.g. K. Krishnamurthy"/>
        </div>
        <div>
          <div style={{fontSize:"10px",color:DIM,marginBottom:"4px"}}>Designation / Organisation</div>
          <Fi value={expo.judgeOrg||""} onChange={e=>upd({judgeOrg:e.target.value})} placeholder="e.g. Director of Innovation, Brainovision"/>
        </div>
        {flash&&<div style={{fontSize:"10px",color:GR,textAlign:"center"}}>✓ Auto-saved</div>}
      </div>
    </div>}/>

    {/* Logo */}
    <Crd ch={<div>
      <Lbl ch="EXPO LOGO (optional)"/>
      <div style={{fontSize:"10px",color:DIM,marginBottom:"10px"}}>Appears in PDF report header. Max 600KB — PNG / JPG / SVG.</div>
      {expo.logo&&<div style={{textAlign:"center",marginBottom:"10px"}}>
        <img src={expo.logo} alt="Logo" style={{maxHeight:"80px",maxWidth:"100%",objectFit:"contain",borderRadius:"6px",border:`1px solid ${BD}`}}/>
      </div>}
      <div style={{display:"flex",gap:"8px"}}>
        <Btn v="outline" full ch={expo.logo?"↺ REPLACE LOGO":"📷 UPLOAD LOGO"} onClick={()=>fileRef.current.click()}/>
        {expo.logo&&<Btn v="danger" s={{padding:"10px 12px"}} ch="✕" onClick={()=>upd({logo:""})}/>}
      </div>
      <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleLogo}/>
    </div>}/>

    {/* Custom categories */}
    <Crd ch={<div>
      <Lbl ch="CUSTOM STALL CATEGORIES (optional)"/>
      <div style={{fontSize:"10px",color:DIM,marginBottom:"10px"}}>
        Add your own categories. If none added, the default HackFusion categories are used.
      </div>
      {customCats.length===0&&<div style={{padding:"8px",background:"#090b12",borderRadius:"6px",marginBottom:"10px",fontSize:"10px",color:DIM,textAlign:"center"}}>
        Using defaults (HW/IoT · Robotics · AI/ML · GreenTech · Agrotech · Software · Open)
      </div>}
      {customCats.length>0&&<div style={{marginBottom:"10px"}}>
        {customCats.map(c=><div key={c} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#090b12",borderRadius:"6px",marginBottom:"5px",border:`1px solid ${BD}`}}>
          <span style={{fontSize:"12px",color:TX}}>{c}</span>
          <button onClick={()=>delCat(c)} style={{background:"none",border:"none",color:RD,cursor:"pointer",fontSize:"16px",padding:"0 4px"}}>✕</button>
        </div>)}
        <div style={{fontSize:"9px",color:DIM,textAlign:"center",marginBottom:"6px"}}>{customCats.length} custom categor{customCats.length===1?"y":"ies"} — these replace the defaults</div>
        <Btn v="danger" full ch="RESET TO DEFAULT CATEGORIES" onClick={()=>{setCustomCats([]);LS.s("hfj_cats",[]);}}/>
      </div>}
      <div style={{display:"flex",gap:"8px"}}>
        <Fi value={nc} onChange={e=>sNc(e.target.value)} placeholder="e.g. FinTech / Blockchain"
          onKeyDown={e=>e.key==="Enter"&&addCat()} s={{flex:1}}/>
        <Btn ch="+ ADD" onClick={addCat} s={{padding:"10px 12px"}}/>
      </div>
    </div>}/>

    {/* Team Import */}
    <TeamImport cats={cats} onImport={onImport}/>
  </div>;
}

// ── Teams ─────────────────────────────────────────────────────────────────────
function Teams({teams,set,go,cats}){
  const [n,sN]=useState("");
  const [cat,sCat]=useState(cats[0]);
  const [d,sD]=useState("");
  const [eid,sE]=useState(null);

  const save=()=>{
    if(!n.trim())return;
    if(eid){set(ts=>ts.map(t=>t.id===eid?{...t,name:n.trim(),cat,desc:d}:t));sE(null);}
    else set(ts=>[...ts,mkT(n.trim(),cat,d)]);
    sN("");sD("");sCat(cats[0]);
  };

  const v=teams.filter(t=>t.visited).length,f=teams.filter(t=>t.finalized).length;

  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"12px"}}>
    {teams.length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
      {[["TOTAL",teams.length,TX],["VISITED",v,A],["DONE",f,GR]].map(([l,n,c])=>
        <Crd key={l} s={{textAlign:"center",padding:"10px"}} ch={<><div style={{fontSize:"24px",fontWeight:"bold",color:c}}>{n}</div><div style={{fontSize:"9px",color:DIM,letterSpacing:"1px"}}>{l}</div></>}/>
      )}
    </div>}
    <Crd s={{borderColor:eid?A+"50":BD}} ch={<div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
      <Lbl ch={eid?"EDIT TEAM":"ADD TEAM / PROJECT"}/>
      <Fi value={n} onChange={e=>sN(e.target.value)} placeholder="Team / Project name" onKeyDown={e=>e.key==="Enter"&&save()}/>
      <Fsl value={cat} onChange={e=>sCat(e.target.value)} ch={cats.map(c=><option key={c}>{c}</option>)}/>
      <Fta rows={2} value={d} onChange={e=>sD(e.target.value)} placeholder="Brief description (optional)"/>
      <div style={{display:"flex",gap:"8px"}}>
        <Btn ch={eid?"✓ UPDATE":"+ ADD TEAM"} onClick={save}/>
        {eid&&<Btn v="outline" ch="CANCEL" onClick={()=>{sE(null);sN("");sD("");}}/>}
      </div>
    </div>}/>
    {teams.length===0
      ?<div style={{textAlign:"center",color:DIM,padding:"40px 0",fontSize:"13px"}}>Add your first team above, or import from INFO tab →
              After importing, tap ✎ on each team to verify its category is correct!</div>
      :teams.map((t,i)=>
        <Crd key={t.id} s={{borderLeft:`3px solid ${t.finalized?GR:t.visited?A:BD}`,cursor:"pointer"}} onClick={()=>go(t.id)} ch={
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap",marginBottom:"3px"}}>
                <span style={{fontWeight:"bold",fontSize:"14px",color:TX}}>{i+1}. {t.name}</span>
                {t.finalized&&<Pill c={GR} ch={"✓ "+wt(t.finalScores)+"/10"}/>}
                {t.visited&&!t.finalized&&<Pill c={A} ch="VISITED"/>}
              </div>
              <div style={{fontSize:"10px",color:DIM}}>{t.cat.split("/")[0].trim()}</div>
            </div>
            <div style={{display:"flex",gap:"5px",flexShrink:0}} onClick={e=>e.stopPropagation()}>
              <Btn s={{padding:"6px 9px",fontSize:"10px"}} ch="JUDGE" onClick={()=>go(t.id)}/>
              <Btn v="outline" s={{padding:"6px 8px"}} ch="✎" onClick={()=>{sE(t.id);sN(t.name);sCat(t.cat);sD(t.desc||"");}}/>
              <Btn v="danger" s={{padding:"6px 8px"}} ch="✕" onClick={()=>{if(window.confirm("Remove?"))set(ts=>ts.filter(x=>x.id!==t.id));}}/>
            </div>
          </div>
        }/>
      )
    }
  </div>;
}

// ── Judge ─────────────────────────────────────────────────────────────────────
function Judge({team,upd,back,apiKey}){
  const [sec,sSec]=useState(0);
  const [al,sAl]=useState(false);
  const [ae,sAe]=useState("");

  useEffect(()=>{if(!team.visited)upd({visited:true});},[]);

  const bk=gQB(team.cat);
  const mT=wt(team.manualScores),aiT=team.aiScores?wt(team.aiScores):null,fT=team.finalScores?wt(team.finalScores):null,fs=team.finalScores||eS();
  const uM=(k,v)=>upd({manualScores:{...team.manualScores,[k]:v}});
  const uF=(k,v)=>upd({finalScores:{...(team.finalScores||eS()),[k]:v}});

  async function getAI(){
    if(!_key){sAe("No API key — add in Settings ⚙");return;}
    sAe("");sAl(true);
    try{
      const t=await callAI("You are judging HACKFUSION-2K26 project expo.\nProject: "+team.name+"\nCategory: "+team.cat+"\nDesc: "+(team.desc||"N/A")+"\nStall Notes: "+(team.stallNotes||"None").slice(0,200)+"\nPitch Notes: "+(team.pitchNotes||"None").slice(0,200)+"\n\nReply ONLY in this exact format:\nINNOVATION: 7\nTECHNICAL: 8\nIMPACT: 6\nSCALABILITY: 7\nPRESENTATION: 8\nANALYSIS: Two honest sentences about this project.\nVERDICT: GOOD");
      const sc={innovation:pN(t,"INNOVATION"),technical:pN(t,"TECHNICAL"),impact:pN(t,"IMPACT"),scalability:pN(t,"SCALABILITY"),presentation:pN(t,"PRESENTATION")};
      const vr=pS(t,"VERDICT","GOOD").toUpperCase();
      upd({aiScores:sc,aiAnalysis:pS(t,"ANALYSIS","Assessment complete."),aiVerdict:["STRONG","GOOD","AVERAGE","WEAK"].find(v=>vr.includes(v))||"GOOD"});
      sSec(2);
    }catch(e){sAe(e.message==="NO_KEY"?"No API key — add in Settings ⚙":e.message);}
    sAl(false);
  }

  const SECS=[{i:"❓",l:"Q&A"},{i:"✏️",l:"NOTES"},{i:"🎯",l:"SCORE"}];

  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:CD,borderRadius:"10px",border:`1px solid ${A}30`}}>
      <div>
        <div style={{fontSize:"15px",fontWeight:"bold",color:TX}}>{team.name}</div>
        <div style={{fontSize:"10px",color:DIM}}>{team.cat.split("/")[0].trim()}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        {fT>0&&<div style={{textAlign:"right"}}><div style={{fontSize:"20px",fontWeight:"bold",color:team.finalized?GR:A}}>{fT}</div><div style={{fontSize:"9px",color:DIM}}>/10</div></div>}
        <Btn v="outline" s={{padding:"6px 10px",fontSize:"10px"}} ch="← BACK" onClick={back}/>
      </div>
    </div>

    <div style={{display:"flex",background:CD,borderRadius:"8px",border:`1px solid ${BD}`,overflow:"hidden"}}>
      {SECS.map((s,i)=><button key={i} onClick={()=>sSec(i)} style={{flex:1,padding:"11px 4px",border:"none",cursor:"pointer",background:sec===i?"#131a2e":"transparent",color:sec===i?A:DIM,fontFamily:"'Courier New',monospace",fontSize:"11px",fontWeight:sec===i?"bold":"normal",borderBottom:sec===i?"2px solid "+A:"2px solid transparent",transition:"all .2s"}}><div style={{fontSize:"16px"}}>{s.i}</div>{s.l}</button>)}
    </div>

    {sec===0&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"8px 12px",background:CD,borderRadius:"8px",border:"1px solid "+BD}}>
        <span style={{fontSize:"10px",color:DIM}}>📂 Category:</span>
        <span style={{fontSize:"11px",color:A,fontWeight:"bold"}}>{team.cat}</span>
      </div>
      <Info c={BL} ch={<><strong>🔬 Probe Focus: </strong>{bk.p}</>}/>
      <Crd ch={<><Lbl ch="EXPERT QUESTIONS TO ASK"/>{bk.q.map((q,i)=><div key={i} style={{display:"flex",gap:"10px",marginBottom:"10px"}}><span style={{color:A,fontWeight:"bold",minWidth:"22px",fontSize:"11px",paddingTop:"2px"}}>Q{i+1}</span><span style={{fontSize:"12px",lineHeight:"1.6",color:TX}}>{q}</span></div>)}</>}/>
      <Crd s={{borderColor:RD+"25"}} ch={<><Lbl c={RD} ch="🚩 RED FLAGS"/>{bk.r.map((r,i)=><div key={i} style={{display:"flex",gap:"8px",marginBottom:"8px"}}><span style={{color:RD,minWidth:"14px"}}>⚠</span><span style={{fontSize:"12px",color:"#fca5a5",lineHeight:"1.5"}}>{r}</span></div>)}</>}/>
    </div>}

    {sec===1&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
      <Crd ch={<><Lbl ch="STALL OBSERVATIONS"/><Fta rows={5} value={team.stallNotes} onChange={e=>upd({stallNotes:e.target.value})} placeholder="Demo quality, team confidence, technical depth, audience reaction..."/></>}/>
      <Crd ch={<><Lbl ch="PITCH SUMMARY (used for AI scoring)"/><Fta rows={4} value={team.pitchNotes} onChange={e=>upd({pitchNotes:e.target.value})} placeholder="Their claims — market, tech, traction, vision, numbers..."/><div style={{fontSize:"10px",color:DIM,marginTop:"6px"}}>More detail here = better AI assessment.</div></>}/>
      <div style={{textAlign:"center"}}><Btn ch="→ GO TO SCORE TAB" onClick={()=>sSec(2)} v="outline"/></div>
    </div>}

    {sec===2&&<div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px"}}>
        <Crd s={{textAlign:"center",padding:"10px"}} ch={<><div style={{fontSize:"9px",color:A,letterSpacing:"1px",marginBottom:"3px"}}>MANUAL</div><div style={{fontSize:"26px",fontWeight:"bold",color:A}}>{mT||"—"}</div></>}/>
        <Crd s={{textAlign:"center",padding:"10px",borderColor:BL+"30"}} ch={<><div style={{fontSize:"9px",color:BL,letterSpacing:"1px",marginBottom:"3px"}}>AI SCORE</div><div style={{fontSize:"26px",fontWeight:"bold",color:BL}}>{aiT!==null?aiT:"—"}</div></>}/>
        <Crd s={{textAlign:"center",padding:"10px",borderColor:team.finalized?GR+"50":BD}} ch={<><div style={{fontSize:"9px",color:GR,letterSpacing:"1px",marginBottom:"3px"}}>FINAL</div><div style={{fontSize:"26px",fontWeight:"bold",color:team.finalized?GR:TX}}>{fT||"—"}</div></>}/>
      </div>

      <Crd ch={<div>
        <Lbl ch="① YOUR MANUAL SCORES"/>
        {CR.map(c=><div key={c.key} style={{marginBottom:"10px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>
            <span style={{fontSize:"11px",color:c.color}}>{c.icon} {c.label}</span>
            <span style={{fontSize:"9px",color:DIM}}>weight {c.w}%</span>
          </div>
          <Sld val={team.manualScores[c.key]} onChange={v=>uM(c.key,v)} color={c.color} disabled={team.finalized}/>
        </div>)}
        <Btn v="outline" full disabled={team.finalized} s={{opacity:team.finalized?0.35:1}} ch="USE MANUAL AS FINAL →" onClick={()=>upd({finalScores:{...team.manualScores}})}/>
      </div>}/>

      <Crd s={{borderColor:BL+"30"}} ch={<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
          <Lbl c={BL} ch="② AI SCORE — Compare"/>
          <Btn s={{padding:"6px 12px",fontSize:"10px",background:BL,color:"#000",border:"1px solid "+BL}} ch={team.aiScores?"↺ REFRESH AI":"✨ GET AI SCORE"} onClick={getAI} loading={al} disabled={team.finalized}/>
        </div>
        {!apiKey&&<Info c={A} ch="🔑 Add Anthropic API key in Settings ⚙ to enable AI scoring."/>}
        <Err m={ae}/>
        {team.aiScores?<div>
          {team.aiAnalysis&&<div style={{fontSize:"11px",color:"#93c5fd",padding:"8px",background:"#0a1020",borderRadius:"6px",marginBottom:"10px",lineHeight:"1.6"}}>{team.aiAnalysis}</div>}
          <div style={{background:"#090b12",borderRadius:"8px",padding:"10px",marginBottom:"10px"}}>
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr 26px 26px",gap:"6px 8px",alignItems:"center"}}>
              <div/><div/>
              <span style={{fontSize:"8px",color:A,textAlign:"center"}}>YOU</span>
              <span style={{fontSize:"8px",color:BL,textAlign:"center"}}>AI</span>
              {CR.map(c=>{
                const m=team.manualScores[c.key]||0,a=team.aiScores[c.key]||0,diff=+(a-m).toFixed(1);
                return [
                  <span key={c.key+"l"} style={{fontSize:"10px",color:c.color,whiteSpace:"nowrap"}}>{c.icon} {c.label}</span>,
                  <div key={c.key+"b"} style={{height:"6px",background:BD,borderRadius:"3px",position:"relative"}}>
                    <div style={{position:"absolute",left:0,width:(m*10)+"%",height:"100%",background:A,borderRadius:"3px",opacity:0.7}}/>
                    <div style={{position:"absolute",left:0,width:(a*10)+"%",height:"4px",top:"1px",background:BL,borderRadius:"3px",opacity:0.6}}/>
                  </div>,
                  <span key={c.key+"m"} style={{fontSize:"12px",fontWeight:"bold",color:A,textAlign:"center"}}>{m}</span>,
                  <div key={c.key+"a"} style={{textAlign:"center",position:"relative"}}>
                    <span style={{fontSize:"12px",fontWeight:"bold",color:BL}}>{a}</span>
                    {diff!==0&&<span style={{position:"absolute",top:"-8px",right:"-2px",fontSize:"8px",color:diff>0?GR:RD,fontWeight:"bold"}}>{diff>0?"+"+diff:diff}</span>}
                  </div>
                ];
              })}
            </div>
          </div>
          {team.finalized&&<div style={{padding:"8px 10px",background:"#1a1200",border:"1px solid "+A+"40",borderRadius:"6px",fontSize:"10px",color:A,textAlign:"center",marginBottom:"6px"}}>
            🔒 Locked — tap <strong>UNLOCK TO EDIT</strong> in ③ below before changing scores
          </div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px"}}>
            <Btn v="outline" disabled={team.finalized} s={{width:"100%",fontSize:"10px",padding:"8px 4px",opacity:team.finalized?0.35:1}} ch="USE AI" onClick={()=>upd({finalScores:{...team.aiScores}})}/>
            <Btn v="outline" disabled={team.finalized} s={{width:"100%",fontSize:"10px",padding:"8px 4px",borderColor:"#a78bfa",color:"#a78bfa",opacity:team.finalized?0.35:1}} ch="AVERAGE" onClick={()=>{const avg={};CR.forEach(c=>{avg[c.key]=parseFloat(((team.manualScores[c.key]+(team.aiScores?.[c.key]||0))/2).toFixed(1));});upd({finalScores:avg});}}/>
            <Btn v="outline" disabled={team.finalized} s={{width:"100%",fontSize:"10px",padding:"8px 4px",opacity:team.finalized?0.35:1}} ch="USE MINE" onClick={()=>upd({finalScores:{...team.manualScores}})}/>
          </div>
        </div>:<div style={{color:DIM,fontSize:"11px",textAlign:"center",padding:"14px 0"}}>{apiKey?"Tap GET AI SCORE above":"Add API key in Settings ⚙"}</div>}
      </div>}/>

      <Crd s={{borderColor:GR+"40"}} ch={<div>
        <Lbl c={GR} ch="③ FINAL SCORE — Adjust then Lock"/>
        {team.aiScores&&<div style={{fontSize:"10px",color:DIM,marginBottom:"10px"}}>Ref: <span style={{color:A}}>amber=manual</span> · <span style={{color:BL}}>blue=AI</span></div>}
        {CR.map(c=><div key={c.key} style={{marginBottom:"10px"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:"3px"}}>
            <span style={{fontSize:"11px",color:c.color}}>{c.icon} {c.label}</span>
            {team.aiScores&&<span style={{fontSize:"9px",color:DIM}}><span style={{color:A}}>{team.manualScores[c.key]}</span> · <span style={{color:BL}}>{team.aiScores[c.key]}</span></span>}
          </div>
          <Sld val={fs[c.key]} onChange={v=>uF(c.key,v)} color={GR} disabled={team.finalized}/>
        </div>)}
        {!team.finalized
          ?<Btn v="green" full ch={"🔒 LOCK FINAL — "+(fT||wt(fs))+"/10"} s={{marginTop:"8px"}} onClick={()=>upd({finalized:true})}/>
          :<div style={{textAlign:"center",padding:"14px",background:"#0a1a0f",borderRadius:"8px",border:"1px solid "+GR+"40",marginTop:"8px"}}>
            <div style={{fontSize:"32px",fontWeight:"bold",color:GR,marginBottom:"4px"}}>{fT}/10</div>
            <div style={{fontSize:"11px",color:"#86efac",marginBottom:"10px"}}>✓ Score Finalized</div>
            <Btn v="outline" s={{borderColor:A,color:A}} ch="UNLOCK TO EDIT" onClick={()=>upd({finalized:false})}/>
          </div>
        }
      </div>}/>
    </div>}
  </div>;
}

// ── Results ───────────────────────────────────────────────────────────────────
function Results({teams,set,apiKey,go,expo}){
  const [op,sOp]=useState(null);
  const ranked=[...teams].filter(t=>t.finalScores&&wt(t.finalScores)>0).sort((a,b)=>wt(b.finalScores)-wt(a.finalScores));
  const pend=teams.filter(t=>!t.finalScores||wt(t.finalScores)===0);
  const MD=["🥇","🥈","🥉"],VC={STRONG:GR,GOOD:A,AVERAGE:"#fb923c",WEAK:RD};

  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"12px"}}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}}>
      {[["TOTAL",teams.length,TX],["SCORED",ranked.length,A],["FINAL",teams.filter(t=>t.finalized).length,GR]].map(([l,n,c])=>
        <Crd key={l} s={{textAlign:"center",padding:"10px"}} ch={<><div style={{fontSize:"24px",fontWeight:"bold",color:c}}>{n}</div><div style={{fontSize:"9px",color:DIM,letterSpacing:"1px"}}>{l}</div></>}/>
      )}
    </div>
    {teams.length>0&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
      <Btn v="outline" s={{width:"100%",borderColor:GR,color:GR,padding:"12px 8px"}}
        ch={<span style={{display:"block",textAlign:"center"}}><div>📄 PDF REPORT</div><div style={{fontSize:"9px",opacity:0.7}}>Print / Save</div></span>}
        onClick={()=>xPDF(teams,expo)}/>
      <Btn v="outline" s={{width:"100%",borderColor:BL,color:BL,padding:"12px 8px"}}
        ch={<span style={{display:"block",textAlign:"center"}}><div>📊 CSV / EXCEL</div><div style={{fontSize:"9px",opacity:0.7}}>Download</div></span>}
        onClick={()=>xCSV(teams,expo)}/>
    </div>}
    {ranked.length>0&&<Crd ch={<div>
      <Lbl ch="🏆 LEADERBOARD"/>
      {ranked.map((t,i)=>{
        const io=op===t.id;
        return <div key={t.id} style={{marginBottom:"6px"}}>
          <div onClick={()=>sOp(io?null:t.id)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px",background:io?"#131a2e":"#090b12",borderRadius:io?"8px 8px 0 0":"8px",cursor:"pointer",border:"1px solid "+(io?A+"40":BD)}}>
            <span style={{fontSize:"20px",minWidth:"26px"}}>{MD[i]||"#"+(i+1)}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:"bold",fontSize:"13px",color:TX}}>{t.name}</div>
              <div style={{fontSize:"10px",color:DIM}}>{t.cat.split("/")[0].trim()}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:"22px",fontWeight:"bold",color:i===0?A:TX}}>{wt(t.finalScores)}</div>
              <div style={{fontSize:"9px",color:DIM}}>/10</div>
            </div>
          </div>
          {io&&<div style={{padding:"12px",background:"#0a0d15",borderRadius:"0 0 8px 8px",border:"1px solid "+BD,borderTop:"none"}}>
            {CR.map(c=><div key={c.key} style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"7px"}}>
              <span style={{fontSize:"10px",color:c.color,width:"86px"}}>{c.icon} {c.label}</span>
              <div style={{flex:1,height:"6px",background:BD,borderRadius:"3px",position:"relative"}}>
                <div style={{position:"absolute",left:0,width:((t.finalScores[c.key]||0)*10)+"%",height:"100%",background:c.color,borderRadius:"3px"}}/>
              </div>
              <span style={{fontSize:"12px",color:c.color,fontWeight:"bold",width:"22px",textAlign:"right"}}>{t.finalScores[c.key]}</span>
              {t.aiScores&&<span style={{fontSize:"9px",color:BL,width:"32px"}}>AI:{t.aiScores[c.key]}</span>}
            </div>)}
            {t.aiAnalysis&&<div style={{fontSize:"11px",color:"#93c5fd",padding:"8px",background:"#0a1020",borderRadius:"6px",marginBottom:"8px",lineHeight:"1.6"}}>{t.aiAnalysis}</div>}
            {t.aiVerdict&&<Pill c={VC[t.aiVerdict]||A} ch={t.aiVerdict}/>}
            <div style={{marginTop:"10px"}}><Btn s={{padding:"6px 12px",fontSize:"10px"}} ch="EDIT SCORES" onClick={()=>go(t.id)}/></div>
          </div>}
        </div>;
      })}
    </div>}/>}
    {pend.length>0&&<Crd ch={<div>
      <Lbl c={DIM} ch={"PENDING ("+pend.length+")"}/>
      {pend.map(t=><div key={t.id} onClick={()=>go(t.id)} style={{display:"flex",alignItems:"center",gap:"10px",padding:"8px",background:"#090b12",borderRadius:"6px",marginBottom:"6px",cursor:"pointer"}}>
        <span style={{color:DIM}}>○</span>
        <span style={{flex:1,fontSize:"13px",color:DIM}}>{t.name}</span>
        <Pill c={DIM} ch={t.visited?"VISITED":"NOT VISITED"}/>
      </div>)}
    </div>}/>}
    {ranked.length===0&&pend.length===0&&<div style={{textAlign:"center",color:DIM,padding:"40px 0"}}>Add teams and judge them to see results →</div>}
  </div>;
}

// ── Settings ──────────────────────────────────────────────────────────────────
function Settings({apiKey,onSave,teams,set,expo}){
  const [k,sK]=useState(apiKey||"");
  const [show,sShow]=useState(false);
  const [saved,sSaved]=useState(false);
  const save=()=>{onSave(k.trim());sSaved(true);setTimeout(()=>sSaved(false),1500);};

  return <div className="fi" style={{display:"flex",flexDirection:"column",gap:"12px"}}>
    <Info c={BL} ch={<div>
      <strong style={{color:TX}}>Q&A, Notes, Manual Scoring</strong> — fully offline, no key needed.<br/>
      <strong style={{color:TX}}>AI Scores</strong> — need Anthropic API key.<br/>
      💰 New accounts get <strong>$5 free</strong> — enough for a full expo day.<br/>
      🔗 <strong>console.anthropic.com</strong> → API Keys
    </div>}/>
    <Crd ch={<div>
      <Lbl ch="ANTHROPIC API KEY"/>
      <div style={{position:"relative",marginBottom:"10px"}}>
        <Fi type={show?"text":"password"} value={k} onChange={e=>sK(e.target.value)} placeholder="sk-ant-api03-..." s={{paddingRight:"44px"}}/>
        <button onClick={()=>sShow(s=>!s)} style={{position:"absolute",right:"10px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:DIM,cursor:"pointer",fontSize:"14px"}}>{show?"🙈":"👁️"}</button>
      </div>
      <div style={{fontSize:"9px",color:DIM,marginBottom:"10px"}}>Saved in localStorage — persists across sessions.</div>
      <div style={{display:"flex",gap:"8px"}}>
        <Btn s={{flex:1}} ch={saved?"✓ SAVED!":"SAVE KEY"} onClick={save}/>
        {k&&<Btn v="danger" ch="CLEAR" onClick={()=>{sK("");onSave("");}}/>}
      </div>
      {apiKey&&<div style={{marginTop:"10px",padding:"8px",background:"#0a1a0f",borderRadius:"6px",border:"1px solid "+GR+"30",fontSize:"11px",color:GR}}>✓ API key active — AI features enabled</div>}
    </div>}/>
    <Crd ch={<div>
      <Lbl ch="📱 INSTALL AS PWA APP"/>
      <div style={{fontSize:"11px",color:DIM,lineHeight:"1.9"}}>
        <strong style={{color:TX}}>iPhone Safari: </strong><span style={{color:A}}>Share ↑</span> → "Add to Home Screen" → Add<br/>
        <strong style={{color:TX}}>Android Chrome: </strong><span style={{color:A}}>⋮</span> → "Add to Home screen" → Install<br/>
        <span style={{fontSize:"10px",color:"#475569"}}>⚖️ JudgePro · Full screen · Offline · Data persists</span>
      </div>
    </div>}/>
    <Crd ch={<div>
      <Lbl ch="EXPORT DATA"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",marginBottom:"8px"}}>
        <Btn v="outline" s={{width:"100%",borderColor:GR,color:GR}} ch="📄 PDF REPORT" onClick={()=>xPDF(teams,expo)}/>
        <Btn v="outline" s={{width:"100%",borderColor:BL,color:BL}} ch="📊 CSV EXPORT" onClick={()=>xCSV(teams,expo)}/>
      </div>
      <div style={{fontSize:"9px",color:DIM}}>PDF: Full scorecard · CSV: All data for Excel / Google Sheets</div>
    </div>}/>
    <Crd ch={<div>
      <Lbl ch="DATA MANAGEMENT"/>
      <div style={{fontSize:"11px",color:DIM,marginBottom:"10px"}}>All data in localStorage — survives browser close and phone restarts.</div>
      <Btn v="danger" full ch="🗑 CLEAR ALL TEAMS & SCORES" onClick={()=>{if(window.confirm("Delete ALL data? Cannot be undone."))set([]);}}/>
    </div>}/>
    <Crd s={{background:"#0a0d15"}} ch={<div>
      <Lbl ch="ABOUT"/>
      <div style={{fontSize:"11px",color:DIM,lineHeight:"1.8"}}>
        <strong style={{color:TX}}>HackFusion Judge Pro v3.2</strong><br/>
        All-in-One Expert Judging Tool<br/>
        <span style={{color:A}}>Built with Claude AI · Anthropic</span>
      </div>
    </div>}/>
  </div>;
}

function App(){
  const [teams,setTmsRaw]=useState(()=>LS.g("hfj_teams",[]));
  const [screen,sSc]=useState("info");
  const [aid,sAid]=useState(null);
  const [apiKey,sApiKey]=useState(()=>{const k=LS.g("hfj_apikey","");if(k)sKey(k);return k;});
  const [expo,setExpo]=useState(()=>{const saved=LS.g("hfj_expo",null);return saved&&(saved.expoName||saved.logo)?saved:{expoName:"HACKFUSION-2K26",logo:DEFAULT_LOGO};});
  const [customCats,setCustomCats]=useState(()=>LS.g("hfj_cats",[]));

  const setTeams=useCallback(fn=>{
    setTmsRaw(prev=>{const next=typeof fn==="function"?fn(prev):fn;LS.s("hfj_teams",next);return next;});
  },[]);

  const hKey=k=>{sApiKey(k);sKey(k);LS.s("hfj_apikey",k);};
  const upd=useCallback((id,patch)=>setTeams(ts=>ts.map(t=>t.id===id?{...t,...patch}:t)),[setTeams]);
  const at=aid?teams.find(t=>t.id===aid):null;
  const go=id=>{sAid(id);sSc("judge");};
  const v=teams.filter(t=>t.visited).length,f=teams.filter(t=>t.finalized).length;
  const activeCats=customCats.length>0?customCats:CATS;

  const NAV=[
    {id:"info",    i:"🎪",l:"INFO"},
    {id:"teams",   i:"👥",l:"TEAMS"},
    {id:"judge",   i:"⚖️", l:"JUDGE"},
    {id:"results", i:"🏆",l:"RESULTS"},
    {id:"settings",i:"⚙️", l:"SETTINGS"}
  ];

  return <div style={{fontFamily:"'Courier New',monospace",background:BG,minHeight:"100vh",color:TX,maxWidth:"600px",margin:"0 auto"}}>
    <div style={{background:"linear-gradient(135deg,#0d1117,#0a0f1e)",borderBottom:"1px solid "+A+"25",padding:"max(12px,env(safe-area-inset-top)) 16px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:50}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        {expo.logo&&<img src={expo.logo} alt="" style={{height:"32px",objectFit:"contain",borderRadius:"4px"}}/>}
        <div>
          <div style={{fontSize:"9px",color:A,letterSpacing:"3px"}}>◈ {expo.expoName||"HACKFUSION-2K26"}</div>
          <div style={{fontSize:"17px",fontWeight:"bold",color:"#fff"}}>{screen==="judge"&&at?at.name:"Judge Pro ⚖️"}</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
        {teams.length>0&&<div style={{fontSize:"9px",textAlign:"right"}}><div style={{color:A}}>{v}/{teams.length} visited</div><div style={{color:GR}}>{f} final</div></div>}
        <div style={{width:"8px",height:"8px",borderRadius:"50%",background:apiKey?GR:A,boxShadow:"0 0 6px "+(apiKey?GR:A)}}/>
      </div>
    </div>

    <div style={{display:"flex",background:CD,borderBottom:"1px solid "+BD,position:"sticky",top:"58px",zIndex:49,overflowX:"auto"}}>
      {NAV.map(n=><button key={n.id} onClick={()=>{sSc(n.id);if(n.id!=="judge")sAid(null);}} style={{flex:1,padding:"12px 4px",border:"none",cursor:"pointer",background:screen===n.id?"#131a2e":"transparent",color:screen===n.id?A:DIM,fontFamily:"'Courier New',monospace",fontSize:"10px",fontWeight:screen===n.id?"bold":"normal",borderBottom:screen===n.id?"2px solid "+A:"2px solid transparent",transition:"all .2s",textAlign:"center"}}>
        <div style={{fontSize:"15px"}}>{n.i}</div>{n.l}
      </button>)}
    </div>

    <div style={{padding:"14px 14px 100px"}}>
      {screen==="info"&&<ExpoInfo expo={expo} setExpo={setExpo} customCats={customCats} setCustomCats={setCustomCats}
        onImport={newTeams=>{setTeams(ts=>[...ts,...newTeams]);sSc("teams");}}/>}

      {screen==="teams"&&<Teams teams={teams} set={setTeams} go={go} cats={activeCats}/>}

      {screen==="judge"&&(at
        ?<Judge team={at} upd={p=>upd(aid,p)} back={()=>{sSc("teams");sAid(null);}} apiKey={apiKey}/>
        :<div className="fi" style={{display:"flex",flexDirection:"column",gap:"10px"}}>
          <Info ch={<>Select a team from <strong style={{color:A}}>TEAMS</strong> and tap JUDGE.</>}/>
          {teams.map(t=><Crd key={t.id} onClick={()=>go(t.id)} s={{cursor:"pointer",borderLeft:"3px solid "+(t.finalized?GR:t.visited?A:BD)}} ch={
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontWeight:"bold",color:TX}}>{t.name}</div><div style={{fontSize:"10px",color:DIM,marginTop:"2px"}}>{t.cat.split("/")[0].trim()}</div></div>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>{t.finalized&&<Pill c={GR} ch={"✓ "+wt(t.finalScores)}/>}{t.visited&&!t.finalized&&<Pill c={A} ch="VISITED"/>}<span style={{color:DIM,fontSize:"16px"}}>→</span></div>
            </div>
          }/>)}
          {teams.length===0&&<div style={{textAlign:"center",color:DIM,padding:"40px 0"}}>Add teams in TEAMS tab or import from INFO tab →</div>}
        </div>
      )}

      {screen==="results"&&<Results teams={teams} set={setTeams} apiKey={apiKey} go={go} expo={expo}/>}
      {screen==="settings"&&<Settings apiKey={apiKey} onSave={hKey} teams={teams} set={setTeams} expo={expo}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
